name: Codex (Code Review & Issue Generation)

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  schedule:
    - cron: '0 0 * * 0' # Run weekly

jobs:
  analyze:
    name: Codex Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Toolchain
        run: |
          rustup component add clippy
          cargo --version --verbose

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Install clippy-sarif
        run: cargo install clippy-sarif sarif-fmt

      - name: Run Codex (Clippy analysis)
        run: |
          cargo clippy --all-targets --all-features --message-format=json | clippy-sarif | tee rust-clippy-results.sarif | sarif-fmt
        continue-on-error: true

      - name: Upload Codex SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: rust-clippy-results.sarif
          wait-for-processing: true
