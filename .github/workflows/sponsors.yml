name: Sponsors

# Keeps SPONSORS.md and this README's sponsor list in sync with the account's
# GitHub Sponsors listing (shared with crabcc/Vaked — see
# docs/sponsors-profile.md).
#
# NOTE: `sponsorship` is an account-level webhook event, not a repo-level
# one — GitHub Actions' `on:` block has no way to listen for it directly
# (confirmed via actionlint: "unknown Webhook event `sponsorship`"), unlike
# repo events (push, pull_request, etc.). That's why every push to this repo
# was failing workflow-file validation. A daily schedule is the plain-Actions
# way to keep this in sync without standing up an external webhook receiver;
# tailscope-cloud's src/routes/sponsors.ts is the actual real-time webhook
# handler for GitHub Sponsors events (a normal Worker endpoint, not an
# Actions trigger) — this workflow is a slower, infra-free complement to
# that, not a replacement.
on:
  schedule:
    - cron: "17 6 * * *" # daily, off the hour to avoid GitHub's cron-minute pileup
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sponsors-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync sponsor credits
        run: python3 scripts/sync_sponsors.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No sponsor-credit changes."
            exit 0
          fi
          git add SPONSORS.md README.md
          git commit -m "chore(sponsors): sync sponsor credits [skip ci]"
          git push
