name: Rust

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml pins the nightly + components; rustup honors it.
      - name: Toolchain
        run: |
          rustup show
          rustc --version --verbose
          cargo --version --verbose

      - name: Cache
        uses: Swatinem/rust-cache@v2

      # Whole tree must compile (features only gate the applet dispatch table,
      # not module compilation). NOTE: 2000+ warnings are inherited from the
      # c2rust transpile and are cleaned up incrementally, so no -D warnings yet.
      - name: Build (all applets)
        run: cargo build --all-features

      - name: Build (curated core)
        run: >
          cargo build --release --no-default-features
          --features "cat ls echo cp mv rm mkdir rmdir ln pwd touch true false
          head tail wc sort uniq grep sed cut tr chmod chown df du ps kill sleep
          env printenv date basename dirname readlink stat which id whoami ash"

      - name: Smoke test
        run: |
          BIN=target/debug/rustybox
          test "$($BIN echo hi)" = "hi"
          $BIN true  && echo "true ok"
          $BIN false || echo "false ok"
          printf 'a\nb\nc\n' | $BIN wc -l
          printf 'b\na\nb\n' | $BIN sort | $BIN uniq

      - name: Modern backend tests
        run: cargo test --no-default-features --features "modern" --test modern

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: rustfmt (advisory)
        # Transpiled code is not fully rustfmt-clean yet; report but don't fail.
        run: cargo fmt --all -- --check || true
