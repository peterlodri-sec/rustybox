[workspace]
members = ["crates/rustybox-core"]
resolver = "2"

[package]
name = "rustybox"
authors = ["Samuel Ainsworth"]
version = "0.0.0"
publish = false
edition = "2021"
# BusyBox lineage: the transpiled tree is a GPLv2 derivative and stays GPLv2.
license = "GPL-2.0-only"
autobins = false

# [lib]
# name = "rustybox-lib"
# path = "c2rust-lib.rs"
# crate-type = ["staticlib", "rlib"]

[[bin]]
name = "rustybox"
path = "rustybox.rs"

[dependencies]
c2rust-bitfields = "0.3"
c2rust-asm-casts = "0.1"
libc = "0.2"
lazy_static = "1.4"

# Modern, memory-safe applet backends (see MIGRATION.md). Optional; each is
# wired behind a `modern-<applet>` feature and routed by name in `modern.rs`.
uu_cat = { version = "0.9", optional = true }
uu_echo = { version = "0.9", optional = true }
uu_ls = { version = "0.9", optional = true }
uu_cp = { version = "0.9", optional = true }
uu_mv = { version = "0.9", optional = true }
uu_rm = { version = "0.9", optional = true }
uu_mkdir = { version = "0.9", optional = true }
uu_rmdir = { version = "0.9", optional = true }
uu_ln = { version = "0.9", optional = true }
uu_pwd = { version = "0.9", optional = true }
uu_touch = { version = "0.9", optional = true }
uu_true = { version = "0.9", optional = true }
uu_false = { version = "0.9", optional = true }
uu_head = { version = "0.9", optional = true }
uu_tail = { version = "0.9", optional = true }
uu_wc = { version = "0.9", optional = true }
uu_sort = { version = "0.9", optional = true }
uu_uniq = { version = "0.9", optional = true }
uu_cut = { version = "0.9", optional = true }
uu_tr = { version = "0.9", optional = true }
uu_chmod = { version = "0.9", optional = true }
uu_chown = { version = "0.9", optional = true }
uu_df = { version = "0.9", optional = true }
uu_du = { version = "0.9", optional = true }
uu_env = { version = "0.9", optional = true }
uu_printenv = { version = "0.9", optional = true }
uu_date = { version = "0.9", optional = true }
uu_basename = { version = "0.9", optional = true }
uu_dirname = { version = "0.9", optional = true }
uu_readlink = { version = "0.9", optional = true }
uu_stat = { version = "0.9", optional = true }
uu_seq = { version = "0.9", optional = true }
uu_sleep = { version = "0.9", optional = true }
uu_id = { version = "0.9", optional = true }
uu_whoami = { version = "0.9", optional = true }
uu_yes = { version = "0.9", optional = true }
uu_tac = { version = "0.9", optional = true }
uu_nl = { version = "0.9", optional = true }
uu_tee = { version = "0.9", optional = true }
uu_mktemp = { version = "0.9", optional = true }
uu_realpath = { version = "0.9", optional = true }
uu_nproc = { version = "0.9", optional = true }
uu_printf = { version = "0.9", optional = true }
uu_link = { version = "0.9", optional = true }
uu_unlink = { version = "0.9", optional = true }
uu_logname = { version = "0.9", optional = true }
uu_factor = { version = "0.9", optional = true }
uu_timeout = { version = "0.9", optional = true }
uu_nohup = { version = "0.9", optional = true }
uu_shuf = { version = "0.9", optional = true }
uu_nice = { version = "0.9", optional = true }
uu_dd = { version = "0.9", optional = true }
uu_truncate = { version = "0.9", optional = true }
uu_fold = { version = "0.9", optional = true }
uu_expand = { version = "0.9", optional = true }
uu_unexpand = { version = "0.9", optional = true }
uu_comm = { version = "0.9", optional = true }
uu_split = { version = "0.9", optional = true }
uu_cksum = { version = "0.9", optional = true }
uu_paste = { version = "0.9", optional = true }
uu_sync = { version = "0.9", optional = true }
uu_uname = { version = "0.9", optional = true }
uu_sum = { version = "0.9", optional = true }
uu_base64 = { version = "0.9", optional = true }

walkdir = { version = "2", optional = true }
flate2 = { version = "1", optional = true }
bzip2 = { version = "0.5", optional = true }
xz2 = { version = "0.1", optional = true }
tar = { version = "0.4", optional = true }
globset = { version = "0.4", optional = true }
grep-regex = { version = "0.1", optional = true }
grep-searcher = { version = "0.1", optional = true }
ignore = { version = "0.4", optional = true }
# Phase 3 (MIGRATION.md): no drop-in crate exists for ifconfig/mount/ip/init,
# so these get idiomatic in-house rewrites with syscalls via nix instead of
# the transpiled unsafe FFI.
nix = { version = "0.29", optional = true, features = ["net", "ioctl", "mount", "user"] }

[dev-dependencies]
duct = "0.13.3"
tempfile = "3.1.0"

# See https://github.com/johnthagen/min-sized-rust
[profile.release]
opt-level = 'z'      # optimize for size
lto = true           # cross-crate inlining + dead-code elimination
codegen-units = 1    # better optimization, smaller output
panic = "abort"      # drop unwinding tables (real size win, not symbol stripping)
strip = false        # keep symbols — size comes from build flags + UPX, not stripping
# Release artifacts are UPX --best --lzma compressed in CI (docker/release), so
# the shipped binary is small on disk while symbols stay in the image.

[features]
